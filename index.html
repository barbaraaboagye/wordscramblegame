<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Scramble Challenge</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .scramble-text {
            letter-spacing: 0.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .animate-bounce-short {
            animation: bounce-short 0.5s ease-in-out 1;
        }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        /* Custom Scrollbar for the grid container if needed */
        .grid-container::-webkit-scrollbar {
            width: 6px;
        }
        .grid-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .grid-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Data Source
        const rawWordList = [
            // Advanced Vocabulary
            { word: "BENEVOLENT", hint: "Describes someone who is kind, generous, and charitable.", category: "Advanced Vocab" },
            { word: "COURAGEOUS", hint: "Being brave; showing the ability to do something that frightens you.", category: "Advanced Vocab" },
            { word: "RELUCTANT", hint: "Feeling hesitant or unwilling to do something.", category: "Advanced Vocab" },
            { word: "AMBITIOUS", hint: "Having a strong desire and determination to succeed.", category: "Advanced Vocab" },
            { word: "MELANCHOLY", hint: "A feeling of deep sadness, often with no obvious cause.", category: "Advanced Vocab" },
            { word: "MISCHIEVOUS", hint: "Naughty; causing trouble in a playful way.", category: "Advanced Vocab" },
            { word: "INEVITABLE", hint: "Something that is certain to happen and cannot be avoided.", category: "Advanced Vocab" },
            { word: "EXAGGERATE", hint: "To represent something as being larger or better than it really is.", category: "Advanced Vocab" },
            { word: "ANONYMOUS", hint: "Not identified by name; of unknown authorship.", category: "Advanced Vocab" },
            { word: "EXTRAORDINARY", hint: "Very unusual or remarkable; outside of the ordinary.", category: "Advanced Vocab" },
            
            // Language & Literature
            { word: "METAPHOR", hint: "A figure of speech that compares two things without using 'like' or 'as'.", category: "Language & Lit" },
            { word: "PROTAGONIST", hint: "The main character or hero of a story.", category: "Language & Lit" },
            { word: "DIALOGUE", hint: "Conversation between two or more people in a book or play.", category: "Language & Lit" },
            { word: "NARRATOR", hint: "The person or voice that tells the story.", category: "Language & Lit" },
            { word: "ALLITERATION", hint: "The occurrence of the same letter or sound at the beginning of adjacent words.", category: "Language & Lit" },
            { word: "SYNONYM", hint: "A word that means exactly or nearly the same as another word.", category: "Language & Lit" },
            { word: "GENRE", hint: "A category of artistic composition, like mystery, fantasy, or sci-fi.", category: "Language & Lit" },
            { word: "PERSUASIVE", hint: "Writing intended to convince someone to do or believe something.", category: "Language & Lit" },
            { word: "BIOGRAPHY", hint: "An account of someone's life written by someone else.", category: "Language & Lit" },
            { word: "CLIMAX", hint: "The most exciting or intense part of a story.", category: "Language & Lit" },

            // Science & World
            { word: "HYPOTHESIS", hint: "An educated guess or proposed explanation based on limited evidence.", category: "Science & World" },
            { word: "ATMOSPHERE", hint: "The envelope of gases surrounding the earth or another planet.", category: "Science & World" },
            { word: "PREDATOR", hint: "An animal that naturally preys on others.", category: "Science & World" },
            { word: "PRECIPITATION", hint: "Rain, snow, sleet, or hail that falls to the ground.", category: "Science & World" },
            { word: "COMPETITION", hint: "Striving to gain or win something by defeating others.", category: "Science & World" },
            { word: "CONSEQUENCE", hint: "A result or effect of an action or condition.", category: "Science & World" },
            { word: "INDIGENOUS", hint: "Describes a person (or animal) native to a specific region.", category: "Science & World" },
            { word: "ENVIRONMENT", hint: "The surroundings or conditions in which a person, animal, or plant lives.", category: "Science & World" },
            { word: "GRAVITY", hint: "The force that attracts a body toward the center of the earth.", category: "Science & World" },
            { word: "GALAXY", hint: "A massive system of stars, stellar remnants, interstellar gas, and dust.", category: "Science & World" }
        ];

        // Helper to scramble a word
        const scrambleString = (str) => {
            const arr = str.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            // If by chance it's the same as original, scramble again
            if (arr.join('') === str) return scrambleString(str);
            return arr.join('');
        };

        function App() {
            const [gameState, setGameState] = useState('welcome'); // welcome, playing, finished
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [userInput, setUserInput] = useState('');
            const [score, setScore] = useState(0);
            const [shake, setShake] = useState(false);
            
            const inputRef = useRef(null);

            // Initialize Game
            const startGame = () => {
                // Prepare questions with extra state for tracking progress
                // We do NOT shuffle anymore to keep the numbers consistent 1-30 in order, 
                // OR we shuffle once and assign IDs. Let's keep them in order of difficulty categories for the tabs.
                const prepared = rawWordList.map((q, idx) => ({
                    ...q,
                    scramble: scrambleString(q.word),
                    solved: false,
                    id: idx
                }));
                
                setQuestions(prepared);
                setCurrentIndex(0);
                setScore(0);
                setGameState('playing');
                setUserInput('');
            };

            // Focus input when switching questions
            useEffect(() => {
                if (gameState === 'playing' && !questions[currentIndex].solved) {
                    // Small timeout to ensure render happens first
                    setTimeout(() => {
                        if (inputRef.current) inputRef.current.focus();
                    }, 50);
                }
            }, [currentIndex, gameState]);

            // Check if game is complete
            useEffect(() => {
                if (questions.length > 0 && questions.every(q => q.solved)) {
                    // Small delay to let the user see the last success state
                    setTimeout(() => setGameState('finished'), 1000);
                }
            }, [questions]);


            const handleCheck = (e) => {
                e.preventDefault();
                const currentQ = questions[currentIndex];
                
                if (currentQ.solved) return;

                const cleanInput = userInput.trim().toUpperCase();

                if (cleanInput === currentQ.word) {
                    // Correct!
                    const newQuestions = [...questions];
                    newQuestions[currentIndex].solved = true;
                    setQuestions(newQuestions);
                    setScore(s => s + 10);
                    setUserInput(''); // Clear for next time, though field will disappear
                } else {
                    // Wrong
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                }
            };

            const switchQuestion = (index) => {
                setCurrentIndex(index);
                setUserInput('');
            };

            // --- RENDERERS ---

            if (gameState === 'welcome') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-lg w-full text-center">
                            <h1 className="text-4xl font-extrabold text-indigo-600 mb-4">Word Scramble</h1>
                            <p className="text-gray-600 mb-6 text-lg">
                                30 Advanced Words. Can you solve them all?
                            </p>
                            <div className="bg-indigo-50 p-4 rounded-lg mb-6 text-left text-sm text-indigo-800">
                                <p className="font-bold mb-2">Instructions:</p>
                                <ul className="list-disc pl-5 space-y-1">
                                    <li>Click the numbered tabs to choose a word.</li>
                                    <li>Unscramble the letters using the hint.</li>
                                    <li>A <span className="text-green-600 font-bold">✓</span> appears when solved.</li>
                                    <li>There is no "Skip" button—you must solve it!</li>
                                </ul>
                            </div>
                            <button 
                                onClick={startGame}
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition duration-200 text-xl shadow-lg transform hover:-translate-y-1"
                            >
                                Start Game
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'finished') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-lg w-full text-center">
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">All Words Solved!</h2>
                            <div className="text-6xl mb-6">🏆</div>
                            <p className="text-gray-600 mb-2">Final Score</p>
                            <div className="text-5xl font-black text-indigo-600 mb-8">{score}</div>
                            
                            <p className="text-gray-600 mb-8">
                                You have successfully unscrambled all 30 words. Excellent vocabulary skills!
                            </p>

                            <button 
                                onClick={startGame}
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200"
                            >
                                Play Again
                            </button>
                        </div>
                    </div>
                );
            }

            // Playing State
            const currentQ = questions[currentIndex];
            const solvedCount = questions.filter(q => q.solved).length;

            return (
                <div className="min-h-screen flex flex-col items-center justify-start p-4 pt-8">
                    <div className="bg-white rounded-2xl shadow-2xl overflow-hidden max-w-2xl w-full flex flex-col mb-4">
                        
                        {/* Header */}
                        <div className="bg-indigo-600 p-4 flex justify-between items-center text-white">
                            <div className="flex items-center space-x-2">
                                <span className="font-bold text-indigo-100">Progress: {solvedCount} / {questions.length}</span>
                            </div>
                            <div className="font-bold text-xl">Score: {score}</div>
                        </div>

                        {/* Navigation Tabs (Grid) */}
                        <div className="bg-gray-50 p-4 border-b border-gray-200">
                            <div className="grid grid-cols-6 sm:grid-cols-10 gap-2">
                                {questions.map((q, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => switchQuestion(idx)}
                                        className={`
                                            relative h-10 w-full rounded-md text-sm font-bold transition-all duration-200 flex items-center justify-center
                                            ${idx === currentIndex 
                                                ? 'ring-2 ring-indigo-500 ring-offset-2 z-10 transform scale-110 shadow-md' 
                                                : 'hover:bg-gray-200'
                                            }
                                            ${q.solved 
                                                ? 'bg-green-500 text-white' 
                                                : (idx === currentIndex ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-600')
                                            }
                                        `}
                                        title={`Word ${idx + 1}`}
                                    >
                                        {q.solved ? (
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                                <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
                                            </svg>
                                        ) : (
                                            idx + 1
                                        )}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Game Area */}
                        <div className="flex-1 p-8 flex flex-col items-center justify-center min-h-[400px]">
                            
                            <span className="inline-block px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-xs font-bold tracking-wide mb-6 uppercase">
                                {currentQ.category}
                            </span>

                            <div className="mb-8 text-center w-full">
                                {currentQ.solved ? (
                                    <div className="animate-bounce-short">
                                        <div className="text-4xl md:text-5xl font-black text-green-500 tracking-widest mb-2 break-words">
                                            {currentQ.word}
                                        </div>
                                        <div className="text-green-600 font-bold text-lg mt-2">
                                            🎉 Solved!
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-4xl md:text-5xl font-black text-gray-800 tracking-widest mb-2 scramble-text break-words uppercase">
                                        {currentQ.scramble}
                                    </div>
                                )}
                                
                                <div className="mt-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 text-left max-w-md mx-auto">
                                    <p className="text-gray-700 italic text-lg leading-relaxed">
                                        <span className="font-bold not-italic text-yellow-700 mr-2">Hint:</span>
                                        {currentQ.hint}
                                    </p>
                                </div>
                            </div>

                            {!currentQ.solved ? (
                                <form onSubmit={handleCheck} className="w-full max-w-sm space-y-4">
                                    <div className={`relative ${shake ? 'animate-shake' : ''}`}>
                                        <input 
                                            ref={inputRef}
                                            type="text" 
                                            value={userInput}
                                            onChange={(e) => setUserInput(e.target.value)}
                                            className={`w-full text-center text-2xl p-4 border-2 rounded-xl outline-none transition-colors uppercase font-bold tracking-wider
                                                ${shake ? 'border-red-400 bg-red-50 text-red-600' : 'border-gray-300 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 text-gray-800'}
                                            `}
                                            placeholder="TYPE ANSWER"
                                            autoComplete="off"
                                            autoCorrect="off"
                                            spellCheck="false"
                                            autoFocus
                                        />
                                    </div>

                                    <button 
                                        type="submit"
                                        className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition duration-200 shadow-md text-lg"
                                    >
                                        Check Answer
                                    </button>
                                </form>
                            ) : (
                                <div className="text-center">
                                    <p className="text-gray-500 mb-4">Select another number from the grid above to continue.</p>
                                    <button 
                                        onClick={() => {
                                            // Find next unsolved index
                                            let nextIdx = -1;
                                            // Look forward
                                            for (let i = currentIndex + 1; i < questions.length; i++) {
                                                if (!questions[i].solved) {
                                                    nextIdx = i;
                                                    break;
                                                }
                                            }
                                            // If not found forward, look from start
                                            if (nextIdx === -1) {
                                                for (let i = 0; i < currentIndex; i++) {
                                                     if (!questions[i].solved) {
                                                        nextIdx = i;
                                                        break;
                                                    }
                                                }
                                            }
                                            
                                            if (nextIdx !== -1) switchQuestion(nextIdx);
                                        }}
                                        className="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-3 px-8 rounded-xl transition duration-200"
                                    >
                                        Go to Next Unsolved Word
                                    </button>
                                </div>
                            )}

                        </div>
                    </div>
                    <div className="text-white/60 text-sm mt-4">
                        Tip: You can click any number in the grid to switch questions.
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
